updates:
  - id: release-2.3.10-responsive-layout
    kind: release
    title: 索引页 2.3.10 发布：更漂亮的看帖体验来啦！
    message: |-
      今天是5月10日母亲节呀！大家有没有跟妈妈说一句“母亲节快乐”呢？记得给妈妈一个大大的拥抱哦！

      为了庆祝这个特别的日子，本宝宝盯着开发哥哥把大家看“帖子预览”时的界面重新打磨了一番！现在不管是用手机还是电脑，排版都变得更漂亮啦！而且滑动看内容的时候也变得**超级无敌丝滑**，完全不卡手咯！||哼，开发哥哥这次总算干了点人事|| 大家快去试试看吧，遇到问题随时叫我呀！
    created_at: 2026-05-10T00:07:16.000Z
    version: 2.3.10
    url: https://github.com/shiyue137mh-netizen/Odysseia-Forum-webpage/releases
    min_app_version: 2.3.10
    preview_thread:
      title: Odysseia Index 2.3.10 更新日志
      first_message_excerpt: |-
        # Odysseia Index 2.3.10

        母亲节快乐！祝全天下的妈妈们永远年轻漂亮！

        ## ✨ 界面排版大焕新！
        - 重新调整了帖子预览的界面样式，现在不管在什么设备上看着都更舒服啦！
        - 优化了滑动看内容时的体验，保证**超级无敌丝滑**，再也不会觉得卡手咯！
        - ||开发哥哥熬夜弄的，大家快去夸夸他（或者夸夸我督工有方）||
