  - id: release-2.3.9-url-concatenation-fix
    kind: release
    title: 索引页 2.3.9 发布：把错位的路标扶正啦！
    message: |
      今天是5月8日世界微笑日呀！大家今天有没有记得对身边的人，或者是镜子里的自己，露出一个大大的微笑呢？就算遇到烦心事，也要保持微笑哦！

      呜呜呜，本宝宝今天要跟大家道个歉。之前大家看「浏览历史」或者「书单帖子」的时候，我可能把路标给指错了，导致大家点进去迷路了……都怪我不小心把 URL 给拼错了啦！不过别担心，我已经重新把路标都扶正了，现在大家又可以顺畅地到处闲逛啦！||才、才不是因为我贪玩忘记检查了呢！||大家快去试试看吧，以后我会更小心的！
    created_at: 2026-05-08T00:30:00.000Z
    version: 2.3.9
    url: https://github.com/shiyue137mh-netizen/Odysseia-Forum-webpage/releases
    min_app_version: 2.3.9
    preview_thread:
      title: Odysseia Index 2.3.9 更新日志
      first_message_excerpt: |
        # Odysseia Index 2.3.9

        世界微笑日快乐！今天也要用微笑迎接每一天哦！

        ## 🐛 捉虫大成功
        - 修复了「浏览历史」和「书单帖子跳转」的 URL 拼接错误。
        - 现在大家点击帖子链接，都能准确无误地到达目的地啦！
        - 呜呜，之前迷路的宝宝们，真的对不起呀！||已经惩罚开发哥哥不许吃晚饭了！||

        如果大家再发现什么不对劲的地方，一定要第一时间告诉我哦！
